# GENERATED FILE - DO NOT MODIFY BY HAND
# Managed by jkit gen-analysis-options.mjs (regenerated on /jkit:flutter-init
# and /jkit:flutter-sync). Edits here are overwritten — to customize, fork
# the relevant rules/flutter/base/templates/*.yaml in the jkit checkout.
#
# Workspace MEMBER analysis_options.yaml — chains the workspace root's
# options (which carries flutter_lints + plugins:) and applies per-member
# analyzer/linter policies.

include: {{INCLUDE_PATH}}

analyzer:
  language:
    strict-casts: true # No implicit casts (dynamic safety)
    strict-raw-types: true # No raw generic types
  errors:
    # Treat key rules as errors (CI will fail)
    avoid_print: error
    unawaited_futures: error
    avoid_dynamic_calls: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # ── Import hygiene ──
    always_use_package_imports: true # No relative imports in lib/
    directives_ordering: true # Consistent import order
    avoid_relative_lib_imports: true # Prevent ../lib/ imports

    # ── Immutability (Freezed / const convention) ──
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true

    # ── Async safety ──
    unawaited_futures: true # Must await or unawaited()
    avoid_void_async: true # async must return Future, not void

    # ── Code quality ──
    avoid_print: true # Use Logger
    avoid_dynamic_calls: true # No calls on dynamic
    prefer_is_empty: true
    prefer_is_not_empty: true
    no_duplicate_case_values: true
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    use_decorated_box: true
    avoid_redundant_argument_values: true
    noop_primitive_operations: true
    unnecessary_lambdas: true

    # ── Type safety ──
    avoid_types_on_closure_parameters: false # Keep explicit types
    always_declare_return_types: true
    type_annotate_public_apis: true
    prefer_void_to_null: true

    # ── Async safety (extra) ──
    unnecessary_await_in_return: true

    # ── Error handling ──
    avoid_catches_without_on_clauses: true

    # ── Modern Dart ──
    use_super_parameters: true
    combinators_ordering: true

    # ── Best practices ──
    cancel_subscriptions: true # Stream subscriptions must cancel
    close_sinks: true # StreamControllers must close
    use_key_in_widget_constructors: true
    prefer_single_quotes: true # Consistent quote style
    require_trailing_commas: true # Trailing commas for formatting
    sort_child_properties_last: true # child: always last in widgets
    use_build_context_synchronously: true
